name: Wisecow CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Kubernetes
    needs: build-and-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Configure kubeconfig
        id: kube
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$KUBE_CONFIG_B64" ]; then
            echo "skip_deploy=true" >> "$GITHUB_OUTPUT"
            echo "::notice::KUBE_CONFIG secret is not set. Skipping deploy."
            exit 0
          fi

          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

          if grep -qE '127\.0\.0\.1|localhost' "$HOME/.kube/config"; then
            echo "skip_deploy=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Kubeconfig points to localhost (Kind/Minikube/Docker Desktop)."
            echo "::notice::GitHub Actions runs in the cloud and cannot reach your Mac's cluster."
            echo "::notice::Deploy locally instead:"
            echo "::notice::  kubectl apply -k k8s"
            echo "::notice::  kubectl set image deployment/wisecow wisecow=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -n wisecow"
            exit 0
          fi

          echo "skip_deploy=false" >> "$GITHUB_OUTPUT"

      - name: Deploy with Kustomize
        if: steps.kube.outputs.skip_deploy != 'true'
        run: |
          cd k8s
          kustomize edit set image wisecow=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          kubectl apply -k .
          kubectl rollout status deployment/wisecow -n wisecow --timeout=180s

      - name: Verify deployment
        if: steps.kube.outputs.skip_deploy != 'true'
        run: |
          kubectl get pods,svc,ingress -n wisecow
          kubectl get deployment wisecow -n wisecow -o jsonpath='{.spec.template.spec.containers[0].image}{"\n"}'

      - name: Deploy skipped summary
        if: steps.kube.outputs.skip_deploy == 'true'
        run: |
          echo "Deploy skipped — use a cloud cluster kubeconfig in KUBE_CONFIG for remote CD."
