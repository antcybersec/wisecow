name: Wisecow CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to Kubernetes (requires cloud cluster in KUBE_CONFIG secret)"
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Kubernetes
    needs: build-and-push
    # Only deploy when manually triggered with deploy=true (cloud kubeconfig required).
    # Push/PR never run kubectl — avoids 127.0.0.1 errors from local Kind/Minikube secrets.
    if: github.event_name == 'workflow_dispatch' && inputs.deploy == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Validate kubeconfig
        id: kube
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$KUBE_CONFIG_B64" ]; then
            echo "::error::KUBE_CONFIG secret is not set."
            exit 1
          fi

          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

          if grep -qE '127\.0\.0\.1|localhost|host\.docker\.internal|kubernetes\.docker\.internal' "$HOME/.kube/config"; then
            echo "::error::KUBE_CONFIG points to a local cluster. GitHub Actions cannot reach it."
            echo "::error::Use a cloud cluster (EKS/GKE/AKS) or deploy locally: kubectl apply -k k8s"
            exit 1
          fi

      - name: Deploy with Kustomize
        run: |
          cd k8s
          kustomize edit set image wisecow=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          kubectl apply -k . --validate=false
          kubectl rollout status deployment/wisecow -n wisecow --timeout=180s

      - name: Verify deployment
        run: |
          kubectl get pods,svc,ingress -n wisecow
          kubectl get deployment wisecow -n wisecow -o jsonpath='{.spec.template.spec.containers[0].image}{"\n"}'
